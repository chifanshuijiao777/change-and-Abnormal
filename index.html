<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 手机自动适配屏幕 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>车间设备变更&初品登记</title>
<style>
*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Microsoft YaHei", system-ui;
}
body{
    background-color: #f5f7fa;
    padding: 20px 15px;
    max-width: 620px;
    margin: 0 auto;
}
.title{
    text-align: center;
    font-size: 22px;
    color: #222;
    margin-bottom: 30px;
    font-weight: 600;
}
.form-item{
    margin-bottom: 20px;
}
.form-item label{
    display: block;
    font-size: 16px;
    color: #333;
    margin-bottom: 8px;
    font-weight: 500;
}
.form-item input,
.form-item textarea,
.form-item select{
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #d0d7e3;
    border-radius: 6px;
    font-size: 16px;
    background: #fff;
}
.form-item textarea{
    min-height: 90px;
    resize: vertical;
}
.submit-btn{
    width: 100%;
    padding: 14px;
    background-color: #1677ff;
    color: #ffffff;
    border: none;
    border-radius: 6px;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
}
.submit-btn:active{
    background-color: #0f5fcc;
}
.tip-text{
    font-size: 13px;
    color: #999;
    margin-top: 6px;
}
</style>
</head>
<body>
<h2 class="title">设备变更与初品信息登记</h2>
<!-- ===================== 这里替换你的FormBold链接 ===================== -->
<form action="https://formbold.com/s/3wOE0" method="POST">
    <div class="form-item">
        <label>登记日期 <span style="color:red">*</span></label>
        <input type="date" name="record_date" required>
    </div>

    <div class="form-item">
        <label>登记时间 <span style="color:red">*</span></label>
        <input type="time" name="record_time" required>
    </div>

    <div class="form-item">
        <label>设备编号 <span style="color:red">*</span></label>
        <input type="text" name="device_code" placeholder="输入完整设备编号" required>
        <div class="tip-text">例：EQ-001、M05机床</div>
    </div>

    <div class="form-item">
        <label>变更/调整内容 <span style="color:red">*</span></label>
        <textarea name="change_content" placeholder="详细填写本次设备变更、调试、维修内容" required></textarea>
    </div>

    <div class="form-item">
        <label>初品信息</label>
        <textarea name="first_product_info" placeholder="填写型号、批次、数量、不良现象等（无则留空）"></textarea>
    </div>

    <div class="form-item">
        <label>操作人姓名 <span style="color:red">*</span></label>
        <input type="text" name="operator" placeholder="填写操作工/班组长姓名" required>
    </div>

    <button class="submit-btn" type="submit">提交本次记录</button>
</form>

<!-- 提交成功弹窗提示 -->
<script>
// 提交完成后弹出提示，停留2秒自动清空表单
const form = document.querySelector('form');
form.addEventListener('submit', function(){
    alert("提交成功！可继续填写下一条记录");
    setTimeout(()=>{
        form.reset();
    }, 2000);
})
</script>
</body>
</html>
